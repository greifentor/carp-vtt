#        value: service-interface/src/main/java
#  - type: CLASS
#    package: de.ollie.carp.vtt.core.service.impl
#    target-file-name: ${UnitName}ServiceImpl
#    path: generator
#    template: templates/core/ServiceImpl.vc
#    properties:
#      - name: target-path
#        value: service/src/main/java
# --- JPA ---
  - type: CLASS
    package: de.ollie.carp.vtt.persistence.jpa.dbo
    suppress-when: classModel Load suppress-persistence HasProperty
    resource-class-loader: org.apache.velocity.runtime.resource.loader.ClasspathResourceLoader
    target-file-name: ${UnitName}Dbo
    template: templates/persistence/jpa/Dbo.vc
    properties:
      - name: target-path
        value: jpa-persistence/src/main/java
  - type: ENUM
    package: de.ollie.carp.vtt.persistence.jpa.dbo
    suppress-when: classModel Load suppress-persistence HasProperty
    resource-class-loader: org.apache.velocity.runtime.resource.loader.ClasspathResourceLoader
    target-file-name: ${UnitName}Dbo
    template: templates/persistence/jpa/EnumDbo.vc
    properties:
      - name: target-path
        value: jpa-persistence/src/main/java
  - type: CLASS
    package: de.ollie.carp.vtt.persistence.jpa.mapper
    suppress-when: classModel Load suppress-persistence HasProperty
    path: generator
    target-file-name: ${UnitName}DboMapper
    template: templates/jpa/DboMapper.vc
    properties:
      - name: target-path
        value: jpa-persistence/src/main/java
  - type: CLASS
    package: de.ollie.carp.vtt.persistence.jpa.repository
    suppress-when: classModel Load suppress-persistence HasProperty
    target-file-name: ${UnitName}DboRepository
    path: generator
    template: templates/jpa/DboRepository.vc
    properties:
      - name: target-path
        value: jpa-persistence/src/main/java
  - type: CLASS
    package: de.ollie.carp.vtt.persistence.jpa
    suppress-when: classModel Load suppress-persistence HasProperty
    target-file-name: ${UnitName}PersistenceJpaAdapter
    path: generator
    template: templates/jpa/PersistenceAdapter.vc
    properties:
      - name: target-path
        value: jpa-persistence/src/main/java
